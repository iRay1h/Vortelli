spring:
    application:
        name: vortelli
    
    datasource:
        url: jdbc:mysql//localhost:3306/vortelli
        username: root
        password: 
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        database-platform: org.hibernate.dialect.MySQLDialect
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
            format-sql: true

logging:
  level: 
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: DEBUG

server:
  port: 8080
  servlet:
    context-path: /api/v1/vortelli